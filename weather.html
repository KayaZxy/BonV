<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>天气 · 出差助手</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="page">
  <h1 class="large-title">天气查询</h1>
  <p class="subtitle">目的地实时天气 + 未来 3 日预报</p>

  <div class="field">
    <div style="display:flex;gap:10px;">
      <input id="cityInput" placeholder="输入城市，如：怀化 / 成都 / 北京" style="flex:1;border:0.5px solid var(--separator);border-radius:var(--radius-sm);padding:12px 14px;font-size:16px;font-family:inherit;background:var(--card);">
      <button class="btn btn-primary" style="width:auto;padding:12px 22px;" onclick="search()">查询</button>
    </div>
  </div>

  <div id="recent" class="chip-row mb"></div>
  <div id="result"></div>
</div>

<script src="assets/js/util.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/nav.js"></script>
<script>
renderTabbar("weather");

const CITY_KEY = "ta_weather_recent";
function getRecent() { try { return JSON.parse(localStorage.getItem(CITY_KEY)) || []; } catch(e){ return []; } }
function pushRecent(c) {
  let r = getRecent().filter(x => x !== c);
  r.unshift(c); r = r.slice(0, 6);
  localStorage.setItem(CITY_KEY, JSON.stringify(r));
  renderRecent();
}
function renderRecent() {
  const r = getRecent();
  document.getElementById("recent").innerHTML = r.length
    ? r.map(c => `<span class="chip" onclick="quick('${esc(c)}')">${esc(c)}</span>`).join("")
    : "";
}
function quick(c) { document.getElementById("cityInput").value = c; search(); }

async function search() {
  const city = document.getElementById("cityInput").value.trim();
  if (!city) { toast("请输入城市名"); return; }
  const box = document.getElementById("result");
  box.innerHTML = `<div class="weather-card"><div class="weather-city">${esc(city)}</div><div class="weather-desc">查询中…</div></div>`;
  const d = await getWeather(city);
  if (!d) {
    box.innerHTML = `<div class="card" style="padding:18px;color:var(--red);">未找到「${esc(city)}」的天气，请确认城市名（支持中文城市名）。</div>`;
    return;
  }
  box.innerHTML = weatherCardHTML(city, d);
  pushRecent(city);
}

// 进入自动查家乡
const p = getProfile();
document.getElementById("cityInput").value = p.homeCity;
renderRecent();
search();
</script>
</body>
</html>
